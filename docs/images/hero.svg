<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TurboMesh repository hero image</title>
  <desc id="desc">A banner showing Bluetooth mesh messaging, topology, telemetry, and Android controls.</desc>
